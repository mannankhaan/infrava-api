version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: infrava-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: infrava
      POSTGRES_PASSWORD: infrava_dev
      POSTGRES_DB: infrava_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
